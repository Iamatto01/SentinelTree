        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Family gallery with modern navigation and touch-friendly layout.">
    <meta name="author" content="Your Name">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <title>Gallery | Jamal Awang Legacy</title>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">Jamal Awang Legacy</a>
        <nav class="topnav" aria-label="Primary">
            <div class="radio-group" id="nav-group">
                <div class="radio-option">
                    <input type="radio" name="nav" id="option1" value="index.html" onclick="window.location.href='index.html'">
                    <label for="option1" class="radio-label">Family Tree</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="nav" id="option2" value="gallery.html" onclick="window.location.href='gallery.html'" checked>
                    <label for="option2" class="radio-label">Gallery</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="nav" id="option3" value="AddPeople.html" onclick="window.location.href='AddPeople.html'">
                    <label for="option3" class="radio-label">Add People</label>
                </div>
                <div class="slider"></div>
            </div>
            
            <label class="theme-switch" aria-label="Toggle dark mode">
                <input id="themeToggle" type="checkbox" class="theme-switch__checkbox">
                <div class="theme-switch__container">
                    <div class="theme-switch__stars-container">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><path d="M12 2L15 9L22 9L16 14L18 21L12 17L6 21L8 14L2 9L9 9L12 2Z" fill="currentColor"/></svg>
                    </div>
                    <div class="theme-switch__circle-container">
                        <div class="theme-switch__sun-moon-container">
                            <div class="theme-switch__moon">
                                <div class="theme-switch__spot"></div>
                                <div class="theme-switch__spot"></div>
                                <div class="theme-switch__spot"></div>
                            </div>
                        </div>
                    </div>
                    <div class="theme-switch__clouds"></div>
                </div>
            </label>
        </nav>
    </header>

    <main class="page-shell">
        <section class="panel">
            <div class="panel-header">
                <div>
                    <p class="section-kicker">Gallery</p>
                    <h2>Shared memories</h2>
                </div>
                <div class="gallery-controls" style="display: flex; gap: 1rem; align-items: center;">
                    <select id="gallery-sort" class="secondary-button" style="padding: 0.5rem; border-radius: 0.5rem; background: transparent; color: inherit; border: 1px solid currentColor;">
                        <option value="all">All Events</option>
                        <option value="Raya 2025">Raya 2025</option>
                        <option value="Gathering">Gathering</option>
                        <option value="Vacation">Vacation</option>
                    </select>
                    <button class="primary-button" id="add-image-button">Add Image</button>
                </div>
            </div>
            <p class="section-note">A lighter gallery layout keeps the same navigation and color system as the tree.</p>
            <div class="gallery-container">
                <div class="gallery-event" data-category="Raya 2025">
                    <h2>Raya 2025</h2>
                    <div class="gallery-scroll">
                        <img src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 220'%3E%3Crect width='320' height='220' rx='24' fill='%23E5E7EB'/%3E%3Cpath d='M36 178l54-62 44 44 42-52 72 70H36z' fill='%239CA3AF'/%3E%3Ccircle cx='118' cy='74' r='18' fill='%239CA3AF'/%3E%3C/svg%3E" alt="Family gallery placeholder">
                        <img src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 220'%3E%3Crect width='320' height='220' rx='24' fill='%23E5E7EB'/%3E%3Cpath d='M36 178l54-62 44 44 42-52 72 70H36z' fill='%239CA3AF'/%3E%3Ccircle cx='118' cy='74' r='18' fill='%239CA3AF'/%3E%3C/svg%3E" alt="Family gallery placeholder">
                        <img src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 220'%3E%3Crect width='320' height='220' rx='24' fill='%23E5E7EB'/%3E%3Cpath d='M36 178l54-62 44 44 42-52 72 70H36z' fill='%239CA3AF'/%3E%3Ccircle cx='118' cy='74' r='18' fill='%239CA3AF'/%3E%3C/svg%3E" alt="Family gallery placeholder">
                    </div>
                </div>
                <div class="gallery-event" data-category="Gathering">
                    <h2>Gathering</h2>
                    <div class="gallery-scroll">
                        <img src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 220'%3E%3Crect width='320' height='220' rx='24' fill='%23E5E7EB'/%3E%3Cpath d='M36 178l54-62 44 44 42-52 72 70H36z' fill='%239CA3AF'/%3E%3Ccircle cx='118' cy='74' r='18' fill='%239CA3AF'/%3E%3C/svg%3E" alt="Family gallery placeholder">
                        <img src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 320 220'%3E%3Crect width='320' height='220' rx='24' fill='%23E5E7EB'/%3E%3Cpath d='M36 178l54-62 44 44 42-52 72 70H36z' fill='%239CA3AF'/%3E%3Ccircle cx='118' cy='74' r='18' fill='%239CA3AF'/%3E%3C/svg%3E" alt="Family gallery placeholder">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Jamal Awang Legacy. All Rights Reserved.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const sortSelect = document.getElementById("gallery-sort");
            const events = document.querySelectorAll(".gallery-event");

            if (sortSelect) {
                sortSelect.addEventListener("change", (e) => {
                    const selected = e.target.value;
                    events.forEach(event => {
                        const category = event.getAttribute("data-category");
                        if (selected === "all" || category === selected) {
                            event.style.display = "block";
                        } else {
                            event.style.display = "none";
                        }
                    });
                });
            }

            const addImageBtn = document.getElementById("add-image-button");
            if (addImageBtn) {
                addImageBtn.addEventListener("click", () => {
                    alert("Add Image functionality would open an upload modal here.");
                });
            }
        });
    </script>
</body>
</html>
