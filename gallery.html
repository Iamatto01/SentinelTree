        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Family gallery with modern navigation and touch-friendly layout.">
    <meta name="author" content="Your Name">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
    <title>Gallery | Jamal Awang Legacy</title>
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">Jamal Awang Legacy</a>
        <nav class="topnav" aria-label="Primary">
            <div class="radio-group" id="nav-group">
                <div class="radio-option">
                    <input type="radio" name="nav" id="option1" value="index.html" onclick="window.location.href='index.html'">
                    <label for="option1" class="radio-label">Family Tree</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="nav" id="option2" value="gallery.html" onclick="window.location.href='gallery.html'" checked>
                    <label for="option2" class="radio-label">Gallery</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="nav" id="option3" value="AddPeople.html" onclick="window.location.href='AddPeople.html'">
                    <label for="option3" class="radio-label">Add People</label>
                </div>
                <div class="slider"></div>
            </div>
            
            <label class="theme-switch" aria-label="Toggle dark mode">
                <input id="themeToggle" type="checkbox" class="theme-switch__checkbox">
                <div class="theme-switch__container">
                    <div class="theme-switch__stars-container">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><path d="M12 2L15 9L22 9L16 14L18 21L12 17L6 21L8 14L2 9L9 9L12 2Z" fill="currentColor"/></svg>
                    </div>
                    <div class="theme-switch__circle-container">
                        <div class="theme-switch__sun-moon-container">
                            <div class="theme-switch__moon">
                                <div class="theme-switch__spot"></div>
                                <div class="theme-switch__spot"></div>
                                <div class="theme-switch__spot"></div>
                            </div>
                        </div>
                    </div>
                    <div class="theme-switch__clouds"></div>
                </div>
            </label>
        </nav>
    </header>

    <main class="page-shell">
        <section class="panel">
            <div class="panel-header">
                <div>
                    <p class="section-kicker">Gallery</p>
                    <h2>Shared memories</h2>
                </div>
                <div class="gallery-controls" style="display: flex; gap: 1rem; align-items: center;">
                    <select id="gallery-sort" class="secondary-button" style="padding: 0.5rem; border-radius: 0.5rem; background: transparent; color: inherit; border: 1px solid currentColor;">
                        <option value="all">All Events</option>
                    </select>
                    <button class="primary-button" id="add-image-button">Add Image</button>
                </div>
            </div>
            <p class="section-note">A lighter gallery layout keeps the same navigation and color system as the tree.</p>
            <div class="gallery-container" id="gallery-container">
                <div class="empty-state" id="gallery-empty" style="text-align: center; padding: 3rem 1rem; color: #5f6874;">
                    No images yet. Click "Add Image" to upload one.
                </div>
            </div>
        </section>

        <!-- Upload Modal -->
        <div id="upload-modal" class="hidden" style="position: fixed; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 1000; display: none; align-items: center; justify-content: center;">
            <div class="form-shell" style="max-width: 500px; width: 90%; margin: 2rem;">
                <div class="panel-header">
                    <h2>Add new image</h2>
                </div>
                <div style="padding: 1.5rem; display: grid; gap: 1.25rem;">
                    <div class="field">
                        <label>Select Image</label>
                        <input type="file" id="upload-file-input" accept="image/*" style="display: block; width: 100%; padding: 0.5rem; border: 1px solid #cbd5e1; border-radius: 8px;">
                        <img id="upload-preview" class="hidden" src="" style="width: 100%; max-height: 250px; object-fit: cover; border-radius: 12px; margin-top: 1rem; display: none;">
                    </div>
                    
                    <div class="field">
                        <label>Event Name</label>
                        <p class="field-help" style="margin-top: -0.25rem; font-size: 0.85rem;">Choose an existing event or type a new one.</p>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                            <select id="upload-event-select" style="flex: 1; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px;">
                                <option value="">-- Select Existing Event --</option>
                            </select>
                        </div>
                        <input type="text" id="upload-new-event-input" placeholder="Or type a new event name..." style="width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 8px; margin-top: 0.5rem;">
                    </div>
                    
                    <p id="upload-status" style="color: #c2410c; font-weight: 600; font-size: 0.9rem; margin: 0;"></p>
                </div>
                <div class="form-actions" style="padding: 1.5rem; border-top: 1px solid rgba(15, 23, 42, 0.08); background: rgba(0,0,0,0.02); border-bottom-left-radius: 28px; border-bottom-right-radius: 28px;">
                    <button id="upload-submit-btn" class="primary-button">Save Image</button>
                    <button id="upload-cancel-btn" class="ghost-button" style="color: #5f6874;">Cancel</button>
                </div>
            </div>
        </div>

    </main>

    <footer>
        <p>&copy; 2026 Jamal Awang Legacy. All Rights Reserved.</p>
    </footer>

    <script src="supabase-config.js"></script>
    <script src="data-store.js"></script>
    <script src="app.js"></script>
    <script src="gallery.js"></script>
</body>
</html>
